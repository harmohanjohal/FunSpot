apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soct-ingress
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - http:
        paths:
          # Route all /api traffic to the backend webservices
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: webservices-service
                port:
                  number: 8083
          # Route everything else to the NextJS frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
