apiVersion: apps/v1
kind: Deployment
metadata:
  name: eventapp
  labels:
    app: eventapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eventapp
  template:
    metadata:
      labels:
        app: eventapp
    spec:
      containers:
        - name: eventapp
          image: ECR_REGISTRY/soct-eventapp:LATEST_SHA
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: soct-config
            - secretRef:
                name: soct-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: eventapp-service
spec:
  selector:
    app: eventapp
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
