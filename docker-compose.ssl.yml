version: '3.8'

services:
  eventapp:
    build:
      context: ./eventapp
    environment:
      - JSON_FILE_PATH=/app/data/Events.json
    volumes:
      - event-data-volume:/app/data
    restart: unless-stopped

  webservices:
    build:
      context: ./webservices
    env_file:
      - .env
    restart: unless-stopped

  imageservice:
    build:
      context: ./imageservice
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_IMAGE_SERVICE_URL: ${REACT_APP_IMAGE_SERVICE_URL}
        REACT_APP_WEB_SERVICES_URL: ${REACT_APP_WEB_SERVICES_URL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx.conf.temp:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot
      - letsencrypt-certs:/etc/letsencrypt
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  event-data-volume:
  certbot-webroot:
  letsencrypt-certs:
