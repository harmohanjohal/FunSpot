name: SSH Manual Deployment

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            # 1. Ensure project directory exists
            if [ ! -d "~/soct-project" ]; then
              git clone https://github.com/harmohanjohal/FunSpot.git ~/soct-project
            fi
            
            cd ~/soct-project
            
            # 2. Update code
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Inject configuration from GitHub Secrets
            echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
            
            # 4. Check for SSL. If it's missing, run the bootstrap
            if [ ! -f "./data/certbot/conf/live/funspot.harmohanjohal.com/fullchain.pem" ]; then
              echo "SSL Certificate missing. Bootstrapping..."
              chmod +x init-letsencrypt.sh
              ./init-letsencrypt.sh
            fi
            
            # 5. Launch / Update Stack
            docker compose -f docker-compose.ssl.yml up -d --build
            
            echo "Deployment successful!"
