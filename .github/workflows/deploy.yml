name: SSH Manual Deployment

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 30m
          script: |
            # 1. Ensure project directory exists
            if [ ! -d ~/soct-project ]; then
              git clone https://github.com/harmohanjohal/FunSpot.git ~/soct-project
            fi
            
            cd ~/soct-project
            
            # 2. Update code
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Inject configuration from GitHub Secrets (Only if it doesn't exist)
            if [ ! -f .env ]; then
              echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
              echo "Created new .env configuration file from secrets."
            else
              echo ".env already exists on server. Skipping override to preserve live configuration keys."
            fi
            
            # 4. Launch / Update Stack
            docker compose -f docker-compose.ssl.yml up -d --build
            
            echo "Deployment successful!"
